<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ксения + Степан</title>

    <link rel="stylesheet" href="css/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="container hero__inner">
        <h1 class="hero__title">
          <span>Ксения</span>
          <span class="hero__plus">+</span>
          <span>Степан</span>
        </h1>
      </div>
    </section>

    <section class="invite">
      <div class="container invite__inner">
        <h2 class="invite__title">
          Дорогие<br>
          родные и друзья!
        </h2>

        <div class="invite__content">
          <div class="invite__text">
            <p>
              В нашей жизни скоро<br>
              произойдет очень важное<br>
              событие - наша свадьба!
            </p>

            <p>
              Мы хотим провести этот<br>
              праздник в кругу самых<br>
              близких и дорогих нам людей<br>
              и будем рады, если вы будете<br>
              рядом.
            </p>
          </div>

          <div class="invite__photo">
            <img src="img/pal_1.png" alt="Ксения и Степан">
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
